<!doctype html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <title>Screenpipe Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
    header { padding: 1rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 1rem; }
    header h1 { font-size: 1.1rem; color: #7dd3fc; }
    select { background: #0f172a; color: #e2e8f0; border: 1px solid #334155; padding: 0.3rem 0.6rem; border-radius: 6px; font-size: 0.9rem; }
    #status { font-size: 0.75rem; margin-left: auto; }
    #status.ok { color: #86efac; }
    #status.err { color: #f87171; }
    #messages { flex: 1; overflow-y: auto; padding: 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
    .msg { max-width: 75%; padding: 0.75rem 1rem; border-radius: 12px; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .msg.user { align-self: flex-end; background: #1d4ed8; color: #fff; }
    .msg.assistant { align-self: flex-start; background: #1e293b; color: #e2e8f0; border: 1px solid #334155; }
    .msg.assistant .ctx-badge { font-size: 0.7rem; color: #86efac; margin-top: 0.5rem; }
    .msg.error { align-self: flex-start; background: #450a0a; color: #fca5a5; }
    form { display: flex; gap: 0.5rem; padding: 1rem 1.5rem; background: #1e293b; border-top: 1px solid #334155; }
    input[type=text] { flex: 1; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 0.6rem 1rem; font-size: 1rem; outline: none; }
    input[type=text]:focus { border-color: #7dd3fc; }
    button { background: #1d4ed8; color: #fff; border: none; border-radius: 8px; padding: 0.6rem 1.2rem; font-size: 1rem; cursor: pointer; }
    button:hover { background: #2563eb; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>
  <header>
    <h1>🧠 Screenpipe Chat</h1>
    <select id="provider">
      {% for p in providers %}
      <option value="{{ p }}">{{ p }}</option>
      {% endfor %}
    </select>
    <input id="model" type="text" placeholder="modell (t.ex. ministral)" style="width:160px">
    <span id="status">kontrollerar...</span>
  </header>

  <div id="messages"></div>

  <form id="chat-form">
    <input id="input" type="text" placeholder="Fråga något om vad du jobbat med..." autocomplete="off">
    <button type="submit" id="send-btn">Skicka</button>
  </form>

  <script>
    const messages = document.getElementById("messages");
    const form = document.getElementById("chat-form");
    const input = document.getElementById("input");
    const btn = document.getElementById("send-btn");
    const status = document.getElementById("status");

    async function checkStatus() {
      const r = await fetch("/status");
      const data = await r.json();
      status.textContent = data.screenpipe ? "● Screenpipe aktiv" : "● Screenpipe offline";
      status.className = data.screenpipe ? "ok" : "err";
    }

    function addMessage(role, text, contextUsed = false) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = text;
      if (role === "assistant" && contextUsed) {
        const badge = document.createElement("div");
        badge.className = "ctx-badge";
        badge.textContent = "✓ Screenpipe-kontext använd";
        div.appendChild(badge);
      }
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const msg = input.value.trim();
      if (!msg) return;

      addMessage("user", msg);
      input.value = "";
      btn.disabled = true;

      try {
        const r = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message: msg,
            provider: document.getElementById("provider").value,
            model: document.getElementById("model").value || undefined,
          }),
        });
        const data = await r.json();
        if (data.error) {
          addMessage("error", "Fel: " + data.error);
        } else {
          addMessage("assistant", data.response, data.context_used);
        }
      } catch {
        addMessage("error", "Kunde inte nå servern.");
      } finally {
        btn.disabled = false;
        input.focus();
      }
    });

    checkStatus();
    setInterval(checkStatus, 30000);
  </script>
</body>
</html>
